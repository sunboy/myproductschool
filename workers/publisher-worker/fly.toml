app = "hackproduct-publisher-worker"
primary_region = "sjc"

[build]

[env]
  PORT = "8081"
  NODE_ENV = "production"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
