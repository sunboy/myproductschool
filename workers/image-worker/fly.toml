app = "hackproduct-image-worker"
primary_region = "sjc"

[build]
  # No Dockerfile needed — Fly detects Node.js automatically

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
