<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your HackProduct account</title>
</head>
<body style="margin:0;padding:0;background-color:#faf6f0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#faf6f0;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:560px;">

          <!-- Top bar -->
          <tr>
            <td style="background-color:#4a7c59;border-radius:10px 10px 0 0;padding:20px 32px;">
              <span style="font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:700;color:#ffffff;letter-spacing:-0.02em;">HackProduct</span>
            </td>
          </tr>

          <!-- Body card -->
          <tr>
            <td style="background-color:#ffffff;padding:40px 32px 32px;border-left:1px solid #e4e0d8;border-right:1px solid #e4e0d8;">

              <h1 style="margin:0 0 16px;font-family:Georgia,'Times New Roman',serif;font-size:28px;font-weight:700;color:#2e3230;letter-spacing:-0.02em;line-height:1.2;">
                You&rsquo;re one step away.
              </h1>

              <p style="margin:0 0 32px;font-size:16px;line-height:1.65;color:#4a4e4a;">
                Click below to confirm your email. Once confirmed, you&rsquo;ll go straight into your first session with Hatch.
              </p>

              <!-- CTA button -->
              <table cellpadding="0" cellspacing="0" style="margin-bottom:32px;">
                <tr>
                  <td style="background-color:#4a7c59;border-radius:6px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;padding:14px 28px;font-family:system-ui,-apple-system,sans-serif;font-size:15px;font-weight:600;color:#ffffff;text-decoration:none;letter-spacing:-0.01em;">
                      Confirm my account &rarr;
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin:0;font-size:13px;color:#74796e;line-height:1.5;">
                If you didn&rsquo;t sign up for HackProduct, you can ignore this email.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background-color:#f0ece4;border-radius:0 0 10px 10px;border:1px solid #e4e0d8;border-top:none;padding:16px 32px;">
              <p style="margin:0;font-size:12px;color:#74796e;line-height:1.5;">
                &copy; 2026 HackProduct &middot;
                <a href="https://hackproduct.com" style="color:#74796e;text-decoration:underline;">hackproduct.com</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
